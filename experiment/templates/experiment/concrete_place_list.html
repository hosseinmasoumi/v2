{% extends "base.html" %}
{% load static %}

{% block title %}محل‌های بتن‌ریزی{% endblock %}

{% block main %}
<div class="container-fluid py-4">
    <div class="page-toolbar">
        <button type="button" class="btn btn-outline-secondary rounded-pill page-back-btn" onclick="history.back()">
            <i class="bi bi-arrow-right me-2"></i>بازگشت
        </button>
        <div class="page-toolbar-actions">
            <a href="{% url 'experiment:concrete_place_create' %}" class="btn btn-primary rounded-pill px-4">
                <i class="fas fa-plus"></i> افزودن محل جدید
            </a>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header text-center">
                    <h3 class="card-title mb-0">لیست محل‌های بتن‌ریزی</h3>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-bordered table-striped">
                            <thead>
                                <tr>
                                    <th>نام</th>
                                    <th>عملیات</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for place in concrete_places %}
                                <tr>
                                    <td>{{ place.name }}</td>
                                    <td>
                                        <a href="{% url 'experiment:concrete_place_update' place.id %}" class="btn btn-warning btn-sm">
                                            <i class="fas fa-edit"></i> ویرایش
                                        </a>
                                        <a href="{% url 'experiment:concrete_place_delete' place.id %}" class="btn btn-danger btn-sm" onclick="return confirm('آیا از حذف این محل بتن‌ریزی اطمینان دارید؟')">
                                            <i class="fas fa-trash"></i> حذف
                                        </a>
                                    </td>
                                </tr>
                                {% empty %}
                                <tr>
                                    <td colspan="2" class="text-center">هیچ محل بتن‌ریزی ثبت نشده است.</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
